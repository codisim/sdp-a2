<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDP Assignment 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assignment2.css">
</head>
<body>
    <div class="container my-4">
        <div class="row mb-3 align-items-center">
            <div class="col-md-8">
                <input id="searchInput" class="form-control" placeholder="Search by name or first letter">
            </div>
            <div class="col-md-2">
                <button id="searchBtn" class="btn btn-warning w-100">Search</button>
            </div>
            <div class="col-md-2 text-end">
                <h5>Total Cart: <span id="groupCount" class="badge bg-secondary">0</span></h5>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-9" id="cardsColumn">
                <div id="cardsRow" class="row g-3"></div>
                <div id="notFound" class="text-muted mt-3" style="display:none;">No drinks found.</div>
            </div>
            <div class="col-lg-3">
                <div class="card">
                    <div class="card-body">
                        <h6 class="card-title">Add to Group</h6>
                        <ul id="groupList" class="list-group list-group-flush"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 id="modalTitle" class="modal-title">Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assignment2.js"></script>
</body>
</html>
